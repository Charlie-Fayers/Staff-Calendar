<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Whereabouts — Clarkson Woods</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f2eb;
    --sage: #4a6741;
    --sage-light: #6b8f62;
    --clay: #c4703a;
    --clay-light: #e8956a;
    --mist: #e8e4da;
    --rule: #d4cfc3;
    --text-secondary: #6b6760;
    --white: #ffffff;
    --map-height: calc(100vh - 240px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid var(--sage);
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .brand {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: var(--paper);
  }

  .brand span {
    color: var(--sage-light);
  }

  .header-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .sync-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: transparent;
    border: 1px solid #444;
    color: #aaa;
    padding: 0.35rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .sync-btn:hover { border-color: var(--sage-light); color: var(--sage-light); }
  .sync-btn.syncing { animation: pulse-border 1s infinite; }

  @keyframes pulse-border {
    0%, 100% { border-color: #444; color: #aaa; }
    50% { border-color: var(--sage-light); color: var(--sage-light); }
  }

  .last-sync {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: #555;
  }

  /* ── CONTROL BAR ── */
  .controls {
    background: var(--mist);
    border-bottom: 1px solid var(--rule);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .week-nav button {
    background: var(--white);
    border: 1px solid var(--rule);
    color: var(--ink);
    width: 28px;
    height: 28px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .week-nav button:hover { background: var(--ink); color: var(--white); }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    min-width: 200px;
    text-align: center;
    color: var(--ink);
    letter-spacing: 0.04em;
  }

  .view-toggle {
    display: flex;
    border: 1px solid var(--rule);
    border-radius: 3px;
    overflow: hidden;
  }

  .view-toggle button {
    background: var(--white);
    border: none;
    padding: 0.3rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--ink);
    color: var(--white);
  }

  .staff-filter {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
  }

  .staff-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.25rem 0.6rem;
    border-radius: 100px;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    white-space: nowrap;
    user-select: none;
  }

  .staff-chip.active {
    color: white !important;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    align-self: center;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: var(--map-height);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--white);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.85rem;
    color: var(--ink);
  }

  .event-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-secondary);
    background: var(--mist);
    padding: 0.15rem 0.5rem;
    border-radius: 100px;
  }

  .sidebar-scroll {
    overflow-y: auto;
    flex: 1;
  }

  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  .day-group {
    border-bottom: 1px solid var(--mist);
  }

  .day-group-header {
    padding: 0.6rem 1.25rem;
    background: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    z-index: 1;
    border-bottom: 1px solid var(--rule);
  }

  .day-group-header.today {
    color: var(--sage);
    background: #edf3ec;
  }

  .event-card {
    padding: 0.8rem 1.25rem;
    border-bottom: 1px solid var(--mist);
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .event-card:hover { background: var(--paper); }
  .event-card.active { background: #edf3ec; }

  .event-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .event-body { flex: 1; min-width: 0; }

  .event-person {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 0.15rem;
  }

  .event-title {
    font-size: 0.78rem;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }

  .event-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-secondary);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .event-meta .proj-badge {
    background: var(--ink);
    color: var(--white);
    padding: 0.05rem 0.35rem;
    border-radius: 2px;
    font-size: 0.6rem;
  }

  .event-meta .location-tag {
    color: var(--sage);
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }

  .event-meta .type-tag {
    background: var(--mist);
    padding: 0.05rem 0.35rem;
    border-radius: 2px;
    font-size: 0.6rem;
  }

  /* ── MAP ── */
  #map {
    width: 100%;
    height: 100%;
    background: #e8e4da;
  }

  /* ── TABLE VIEW ── */
  .table-view {
    flex: 1;
    overflow: auto;
    display: none;
    background: var(--white);
  }

  .table-view.visible { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  thead th {
    background: var(--ink);
    color: var(--white);
    padding: 0.6rem 1rem;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    font-weight: 500;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }

  tbody tr {
    border-bottom: 1px solid var(--mist);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--paper); }

  tbody td {
    padding: 0.55rem 1rem;
    vertical-align: middle;
  }

  .td-person {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .person-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAP POPUP STYLES ── */
  .leaflet-popup-content-wrapper {
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border: 1px solid var(--rule);
    padding: 0;
    overflow: hidden;
  }
  .leaflet-popup-content {
    margin: 0;
    min-width: 220px;
  }
  .popup-inner {
    padding: 0.75rem 1rem;
  }
  .popup-header {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .popup-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.9rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }
  .popup-row {
    font-size: 0.72rem;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.15rem 0;
  }
  .popup-row strong {
    color: var(--ink);
    font-weight: 500;
  }
  .popup-persons {
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--rule);
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .popup-person-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    padding: 0.15rem 0.45rem;
    border-radius: 100px;
    color: white;
  }

  /* ── LEGEND ── */
  .map-legend {
    position: absolute;
    bottom: 24px;
    right: 12px;
    z-index: 1000;
    background: white;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 0.6rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .legend-title {
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.1rem 0;
    color: var(--ink);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--ink);
    color: var(--paper);
    padding: 0.5rem 2rem;
    display: flex;
    gap: 2.5rem;
    align-items: center;
    border-bottom: 1px solid #333;
  }
  .stat-item {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
  }
  .stat-num {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.25rem;
    color: var(--clay-light);
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: #777;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-secondary);
    gap: 0.5rem;
  }
  .empty-state .empty-icon { font-size: 2rem; opacity: 0.3; }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 0.72rem; }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(245,242,235,0.85);
    backdrop-filter: blur(4px);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    transition: opacity 0.3s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--rule);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
  }

  /* ── NOTIFICATION ── */
  .notification {
    position: fixed;
    top: 70px;
    right: 1.5rem;
    background: var(--ink);
    color: var(--paper);
    padding: 0.65rem 1rem;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    z-index: 9998;
    transform: translateY(-10px);
    opacity: 0;
    transition: all 0.3s;
    border-left: 3px solid var(--sage);
    letter-spacing: 0.03em;
    max-width: 300px;
  }
  .notification.show { transform: translateY(0); opacity: 1; }
  .notification.error { border-left-color: var(--clay); }

  /* Map container relative for legend */
  .map-wrap { position: relative; flex: 1; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading calendar data…</div>
</div>

<!-- Notification toast -->
<div class="notification" id="notification"></div>

<header>
  <div class="header-left">
    <div class="brand">Clarkson<span>Woods</span></div>
    <div class="header-subtitle">Staff Whereabouts</div>
  </div>
  <div class="header-right">
    <div class="last-sync" id="lastSync">Not synced</div>

  <div class="stat-item"><span class="stat-num" id="statStaff">—</span><span class="stat-label">staff out</span></div>
  <div class="stat-item"><span class="stat-num" id="statCounties">—</span><span class="stat-label">counties</span></div>
  <div class="stat-item"><span class="stat-num" id="statProjects">—</span><span class="stat-label">projects</span></div>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">This Week's Visits</div>
      <div class="event-count" id="eventCount">0 events</div>
    </div>
    <div class="sidebar-scroll" id="sidebarScroll">
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <p>No events loaded</p>
      </div>

  </div>

  <!-- Map / Table area -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-legend" id="mapLegend"></div>

    <div class="table-view" id="tableView">

          <tr>

            <th>Project #</th>

            <th>Type</th>

        <tbody id="tableBody"></tbody>
      </table>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION — edit these to match your environment
// ═══════════════════════════════════════════════════════════
const CONFIG = {
  // Azure AD app registration
  clientId:    '235958fa-4974-454b-adbe-718690c4213b',
  tenantId:    '1f15dbde-db38-4acb-94c7-a8df84555887',
  redirectUri: 'https://charlie-fayers.github.io/Staff-Calendar/',

  // Microsoft Graph site & list identifiers
  siteId:           'clarksonwoods.sharepoint.com,e4a48d51-cc66-4249-a77a-8140ec2cf009,823cd4e3-cdc8-4537-b0d7-5005a2970cbd',
  staffListName:    'Staff',
  calendarListName: 'StaffCalendarCache',

  // Set to true when running against the real Graph API
  useLiveData: true,
};

// MSAL.js authentication
const msalConfig = {
  auth: {
    clientId:    CONFIG.clientId,
    authority:   `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri,
  },
  cache: {
    cacheLocation: 'sessionStorage',
    storeAuthStateInCookie: false,
  },
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
const graphScopes = ['Sites.Read.All', 'User.Read'];

async function getGraphToken() {
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length === 0) {
    await msalInstance.loginRedirect({ scopes: graphScopes });
    return null;
  }
  try {
    const result = await msalInstance.acquireTokenSilent({
      scopes: graphScopes,
      account: accounts[0],
    });
    return result.accessToken;
  } catch (e) {
    await msalInstance.acquireTokenRedirect({ scopes: graphScopes });
    return null;
  }
}

async function graphFetch(path) {
  const token = await getGraphToken();
  if (!token) return null;
  const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/json',
      'Prefer': 'HonorNonIndexedQueriesWarningMayFailRandomly'
    },
  });
  if (!res.ok) throw new Error(`Graph ${res.status}: ${await res.text()}`);
  return res.json();
}

// Cache for resolved Graph list IDs
const _listIdCache = {};
async function getListId(listName) {
  if (_listIdCache[listName]) return _listIdCache[listName];
  const data = await graphFetch(`/sites/${encodeURIComponent(CONFIG.siteId)}/lists`);
  const list = data.value.find(l => l.displayName === listName);
  if (!list) throw new Error(`List not found: ${listName}`);
  _listIdCache[listName] = list.id;
  return list.id;
}

// Palette of distinct colours assigned to staff in load order
const COLOUR_PALETTE = [
  '#4a6741','#c4703a','#6b5fa0','#2e7d9e','#b05070',
  '#8b6914','#3a7a6a','#7a4030','#5a6a3a','#4a5a8a',
  '#7a8040','#8a4060','#3a6a8a','#6a5030','#5a3a7a',
  '#7a4a50','#3a7a50','#6a7a30','#a05020','#306a6a',
  '#7a3a8a','#4a7a30','#8a7030','#305a8a','#6a3050',
];

// ═══════════════════════════════════════════════════════════
// DEMO DATA — replaced by live SharePoint data in production
// ═══════════════════════════════════════════════════════════
const DEMO_EVENTS = [

  { id:2, person:'Harry',    date:'2026-05-11', projectNo:'9575', title:'SURVEY – 9575 Yalberton Tor Quarry',     town:'Paignton',         county:'Devon',                lat:50.4127, lng:-3.5740, type:'Survey' },
  { id:3, person:'Tom',      date:'2026-05-12', projectNo:'9558', title:'SURVEY – 9558 The Firs Wellsway',        town:'Blackford',        county:'Somerset',             lat:51.2310, lng:-2.7200, type:'Survey' },

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentWeekStart = getWeekStart(new Date());
let allEvents = [];
let filteredEvents = [];
let staffList = [];
let activeStaff = new Set();
let currentView = 'map';
let map, markers = [], markerLayer;

// Demo staff — used when useLiveData is false
const DEMO_STAFF = [
  'Tom','Harry','Polly','Henry','Frankie','Sarah R',
  'Joel','Toby','Molly','Charlie','Charlie D','Miranda',
  'Bex','Chris','Pete','Hannah','Jo','Will'
].map((name, i) => ({
  name,
  email: name.toLowerCase().replace(' ','.') + '@clarksonwoods.co.uk',
  color: COLOUR_PALETTE[i % COLOUR_PALETTE.length]
}));

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // Handle login redirect, if we just came back from one
  try {
    await msalInstance.handleRedirectPromise();
  } catch(e) { console.error('Redirect handle error', e); }

  initMap();
  updateWeekLabel();
  document.getElementById('loadingOverlay').querySelector('.loading-text').textContent = 'Loading staff list\u2026';
  showLoading(true);

  // If using live data and not signed in yet, trigger login
  if (CONFIG.useLiveData && msalInstance.getAllAccounts().length === 0) {
    showLoading(false);
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;font-family:'Instrument Sans',sans-serif;background:#f5f2eb;">
        <h2 style="margin-bottom:1rem;color:#1a1a18;">Staff Whereabouts</h2>
        <p style="margin-bottom:1.5rem;color:#6b6760;">Please sign in with your Clarkson Woods account</p>
        <button id="signinBtn" style="padding:0.75rem 2rem;background:#4a6741;color:white;border:none;border-radius:4px;font-size:1rem;cursor:pointer;font-family:inherit;">Sign in</button>
      </div>`;
    document.getElementById('signinBtn').addEventListener('click', () => {
      msalInstance.loginRedirect({ scopes: graphScopes });
    });
    return;
  }

  await loadStaff();
  buildStaffFilter();
  await loadData();
});

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([52.5, -1.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

// ═══════════════════════════════════════════════════════════
// STAFF LOADING
// ═══════════════════════════════════════════════════════════
async function loadStaff() {
  if (CONFIG.useLiveData) {
    try {
      const listId = await getListId(CONFIG.staffListName);
      const data = await graphFetch(`/sites/${encodeURIComponent(CONFIG.siteId)}/lists/${listId}/items?$expand=fields&$top=999`);
      if (!data) return;  // login redirect in progress
      staffList = data.value
        .filter(r => r.fields && r.fields.Title && r.fields.field_1)
        .map((r, i) => ({
          name:  r.fields.Title,
          email: r.fields.field_1,
          color: COLOUR_PALETTE[i % COLOUR_PALETTE.length]
        }));
      showNotification(`Loaded ${staffList.length} staff members`, 'ok');
    } catch(e) {
      console.error(e);
      showNotification('Could not load staff list — using demo staff', 'error');
      staffList = DEMO_STAFF;
    }
  } else {
    staffList = DEMO_STAFF;
  }
  activeStaff = new Set(staffList.map(s => s.name));
}

function buildStaffFilter() {
  const container = document.getElementById('staffFilter');
  container.innerHTML = '';
  staffList.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'staff-chip active';
    chip.textContent = s.name;
    chip.style.borderColor = s.color;
    chip.style.color = s.color;
    chip.style.backgroundColor = s.color + '22';
    chip.dataset.name = s.name;
    chip.addEventListener('click', () => toggleStaff(s.name, chip, s.color));
    container.appendChild(chip);
  });
  // "All" toggle
  const allBtn = document.createElement('div');
  allBtn.className = 'staff-chip';
  allBtn.textContent = 'All';
  allBtn.style.borderColor = '#999';
  allBtn.style.color = '#999';
  allBtn.style.marginLeft = '0.25rem';
  allBtn.addEventListener('click', selectAllStaff);
  container.appendChild(allBtn);
}

function toggleStaff(name, chip, color) {
  if (activeStaff.has(name)) {
    activeStaff.delete(name);
    chip.classList.remove('active');
    chip.style.backgroundColor = 'transparent';
  } else {
    activeStaff.add(name);
    chip.classList.add('active');
    chip.style.backgroundColor = color + '22';
  }
  renderAll();
}

function selectAllStaff() {
  staffList.forEach(s => activeStaff.add(s.name));
  document.querySelectorAll('.staff-chip[data-name]').forEach(chip => {
    const color = staffList.find(s => s.name === chip.dataset.name)?.color || '#999';
    chip.classList.add('active');
    chip.style.backgroundColor = color + '22';
  });
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════════
async function loadData() {
  showLoading(true);
  document.getElementById('loadingOverlay').querySelector('.loading-text').textContent = 'Loading calendar data…';
  try {
    if (CONFIG.useLiveData) {
      allEvents = await fetchSharePointData();
    } else {
      await new Promise(r => setTimeout(r, 800)); // simulate fetch
      allEvents = DEMO_EVENTS;
      document.getElementById('lastSync').textContent = 'Demo data';
    }
    renderAll();
    showNotification('Calendar data loaded', 'ok');
  } catch(e) {
    showNotification('Failed to load data: ' + e.message, 'error');
  } finally {
    showLoading(false);
  }
}

async function refreshData() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('syncing');
  btn.textContent = '↻ Syncing…';
  await loadData();
  btn.classList.remove('syncing');
  btn.textContent = '↻ Refresh';
  document.getElementById('lastSync').textContent = 'Synced ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
}

// ── Microsoft Graph fetch (production) ─────────────────────
async function fetchSharePointData() {
  const ws = currentWeekStart.toISOString().split('T')[0] + 'T00:00:00Z';
  const we = getWeekEnd(currentWeekStart).toISOString().split('T')[0] + 'T23:59:59Z';
  const listId = await getListId(CONFIG.calendarListName);
  const filter = `fields/EventDate ge '${ws}' and fields/EventDate le '${we}'`;
  const path = `/sites/${encodeURIComponent(CONFIG.siteId)}/lists/${listId}/items?$expand=fields&$top=999&$filter=${encodeURIComponent(filter)}`;
  const data = await graphFetch(path);
  if (!data) return [];   // login redirect in progress
  return data.value.map(item => {
    const f = item.fields || {};
    return {
      id:        item.id,
      person:    f.StaffName,
      date:      f.EventDate ? f.EventDate.split('T')[0] : '',
      projectNo: f.ProjectNumber || extractProjectNo(f.Title),
      title:     f.Title,
      town:      f.Town,
      county:    f.County,
      lat:       parseFloat(f.Latitude),
      lng:       parseFloat(f.Longitude),
      type:      f.EventType || 'Survey',
    };
  });
}

// Extract 4-digit project number from a string
function extractProjectNo(str) {
  const m = (str || '').match(/\b(\d{4})\b/);
  return m ? m[1] : null;
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════
function renderAll() {
  const ws = currentWeekStart;
  const we = getWeekEnd(ws);
  filteredEvents = allEvents.filter(e => {
    const d = new Date(e.date);
    return d >= ws && d <= we && activeStaff.has(e.person);
  });
  updateStats();
  renderSidebar();
  renderMap();
  renderTable();
  renderLegend();
}

function updateStats() {
  const siteVisits = filteredEvents.filter(e => e.type === 'Survey').length;
  const staff = new Set(filteredEvents.map(e => e.person)).size;
  const counties = new Set(filteredEvents.filter(e=>e.county).map(e => e.county)).size;
  const projects = new Set(filteredEvents.filter(e=>e.projectNo).map(e => e.projectNo)).size;
  document.getElementById('statEvents').textContent = siteVisits;
  document.getElementById('statStaff').textContent = staff;
  document.getElementById('statCounties').textContent = counties;
  document.getElementById('statProjects').textContent = projects;
  document.getElementById('eventCount').textContent = filteredEvents.length + ' event' + (filteredEvents.length!==1?'s':'');
}

function renderSidebar() {
  const container = document.getElementById('sidebarScroll');
  if (!filteredEvents.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>No events this week</p></div>';
    return;
  }
  const grouped = groupByDate(filteredEvents);
  const today = new Date().toISOString().split('T')[0];
  let html = '';
  grouped.forEach((events, date) => {
    const isToday = date === today;
    const label = formatDateLabel(date);
    html += `<div class="day-group">
      <div class="day-group-header ${isToday?'today':''}">${label}${isToday?' — Today':''}</div>`;
    events.forEach(e => {
      const color = staffColor(e.person);
      const locTag = e.town ? `<span class="location-tag">◎ ${e.town}${e.county?', '+e.county:''}</span>` : '';
      const projBadge = e.projectNo ? `<span class="proj-badge">${e.projectNo}</span>` : '';
      html += `<div class="event-card" data-id="${e.id}" onclick="focusEvent(${e.id})">
        <div class="event-dot" style="background:${color}"></div>
        <div class="event-body">
          <div class="event-person" style="color:${color}">${e.person}</div>
          <div class="event-title">${e.title}</div>
          <div class="event-meta">${projBadge}${locTag}<span class="type-tag">${e.type}</span></div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderMap() {
  markerLayer.clearLayers();
  // Group events by location (same lat/lng)
  const locations = {};
  filteredEvents.forEach(e => {
    if (!e.lat || !e.lng) return;
    const key = `${e.lat.toFixed(4)},${e.lng.toFixed(4)}`;
    if (!locations[key]) locations[key] = { lat: e.lat, lng: e.lng, events: [] };
    locations[key].events.push(e);
  });

  Object.values(locations).forEach(loc => {
    const events = loc.events;
    const persons = [...new Set(events.map(e => e.person))];
    const multiPerson = persons.length > 1;

    // Build marker SVG
    const size = multiPerson ? 32 : 24;
    const svgParts = persons.slice(0, 4).map((p, i) => {
      const color = staffColor(p);
      if (persons.length === 1) {
        return `<circle cx="12" cy="12" r="10" fill="${color}" opacity="0.9"/>
                <circle cx="12" cy="12" r="5" fill="white" opacity="0.6"/>`;
      }
      const angle = (i / persons.length) * 2 * Math.PI - Math.PI / 2;
      const cx = 16 + 9 * Math.cos(angle);
      const cy = 16 + 9 * Math.sin(angle);
      return `<circle cx="${cx}" cy="${cy}" r="7" fill="${color}" opacity="0.9" stroke="white" stroke-width="1.5"/>`;
    }).join('');
    const extra = persons.length > 4 ? `<text x="${size/2}" y="${size/2+4}" text-anchor="middle" font-family="monospace" font-size="8" fill="#333">+${persons.length-4}</text>` : '';

    const svgIcon = L.divIcon({
      html: `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${svgParts}${extra}</svg>`,
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
    });

    const popupContent = buildPopup(loc, persons);
    const marker = L.marker([loc.lat, loc.lng], { icon: svgIcon })
      .bindPopup(popupContent, { maxWidth: 280 });
    markerLayer.addLayer(marker);
  });

  // Fit bounds if we have markers
  const latlngs = Object.values(locations).map(l => [l.lat, l.lng]);
  if (latlngs.length > 1) {
    map.fitBounds(latlngs, { padding: [40, 40] });
  } else if (latlngs.length === 1) {
    map.setView(latlngs[0], 10);
  }
}

function buildPopup(loc, persons) {
  const events = loc.events;
  const proj = events[0].projectNo ? `<div class="popup-row"><span>Project</span><strong>${events[0].projectNo}</strong></div>` : '';
  const chips = persons.map(p =>
    `<span class="popup-person-chip" style="background:${staffColor(p)}">${p}</span>`
  ).join('');
  return `<div class="popup-inner">
    <div class="popup-header">${events[0].type} · ${formatDateShort(events[0].date)}</div>
    <div class="popup-title">${events[0].title.replace(/^SURVEY\s*–\s*/i,'').replace(/^MEETING\s*–\s*/i,'')}</div>
    ${proj}
    <div class="popup-row"><span>Location</span><strong>${events[0].town || ''}${events[0].county?', '+events[0].county:''}</strong></div>
    <div class="popup-persons">${chips}</div>
  </div>`;
}

function renderLegend() {
  const visibleStaff = [...new Set(filteredEvents.map(e => e.person))];
  const legend = document.getElementById('mapLegend');
  if (!visibleStaff.length) { legend.style.display = 'none'; return; }
  legend.style.display = 'block';
  legend.innerHTML = `<div class="legend-title">Staff this week</div>` +
    visibleStaff.map(p => `<div class="legend-item"><div class="legend-dot" style="background:${staffColor(p)}"></div>${p}</div>`).join('');
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filteredEvents.map(e => {
    const color = staffColor(e.person);
    return `<tr onclick="focusEvent(${e.id})">
      <td><div class="td-person"><div class="person-dot" style="background:${color}"></div>${e.person}</div></td>
      <td style="font-family:'DM Mono',monospace;font-size:0.72rem">${formatDateShort(e.date)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:0.72rem">${e.projectNo||'—'}</td>
      <td>${e.title.replace(/^(SURVEY|MEETING)\s*–\s*/i,'')}</td>
      <td>${e.town||'—'}</td>
      <td>${e.county||'—'}</td>
      <td><span class="type-tag" style="font-family:'DM Mono',monospace;font-size:0.65rem;padding:0.15rem 0.5rem;background:var(--mist);border-radius:2px">${e.type}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-secondary);font-family:'DM Mono',monospace;font-size:0.72rem">No events for this week</td></tr>`;
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════
function focusEvent(id) {
  const e = allEvents.find(x => x.id === id);
  if (!e || !e.lat) return;
  if (currentView !== 'map') setView('map');
  map.flyTo([e.lat, e.lng], 11, { duration: 0.8 });
  // Highlight sidebar card
  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.event-card[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

function setView(view) {
  currentView = view;
  document.getElementById('btnMap').classList.toggle('active', view === 'map');
  document.getElementById('btnTable').classList.toggle('active', view === 'table');
  document.getElementById('map').style.display = view === 'map' ? 'block' : 'none';
  document.getElementById('mapLegend').style.display = view === 'map' ? 'block' : 'none';
  document.getElementById('tableView').classList.toggle('visible', view === 'table');
  if (view === 'map') { setTimeout(() => map.invalidateSize(), 50); }
}

function changeWeek(dir) {
  const d = new Date(currentWeekStart);
  d.setDate(d.getDate() + dir * 7);
  currentWeekStart = d;
  updateWeekLabel();
  renderAll();
}

function goToThisWeek() {
  currentWeekStart = getWeekStart(new Date());
  updateWeekLabel();
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function getWeekStart(d) {
  const date = new Date(d);
  const day = date.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day; // Mon
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function getWeekEnd(ws) {
  const d = new Date(ws);
  d.setDate(d.getDate() + 6);
  d.setHours(23,59,59,999);
  return d;
}

function updateWeekLabel() {
  const ws = currentWeekStart;
  const we = getWeekEnd(ws);
  const fmt = d => d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  document.getElementById('weekLabel').textContent =
    `w/c ${fmt(ws)}  —  ${fmt(we)} ${we.getFullYear()}`;
}

function staffColor(name) {
  return staffList.find(s => s.name === name)?.color || '#888';
}

function groupByDate(events) {
  const map = new Map();
  [...events].sort((a,b) => a.date.localeCompare(b.date)).forEach(e => {
    if (!map.has(e.date)) map.set(e.date, []);
    map.get(e.date).push(e);
  });
  return map;
}

function formatDateLabel(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
}
function formatDateShort(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
}

function showNotification(msg, type='ok') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'notification show' + (type==='error'?' error':'');
  setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
